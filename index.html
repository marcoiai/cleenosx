<!doctype html>
<html lang="en" class="black">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cleenosx</title>
    <script>
      (() => {
        let stored = null;
        try {
          stored = localStorage.getItem("cleanerx.themeMode.v2");
        } catch (_) {
          stored = null;
        }
        const black = stored !== "light";
        document.documentElement.classList.toggle("black", black);
        document.documentElement.style.colorScheme = black ? "dark" : "light";
      })();
    </script>
    <script>
      (() => {
        const showBootError = (message) => {
          const root = document.getElementById("root");
          if (!root) return;
          root.innerHTML = `
            <div style="box-sizing:border-box;min-height:100vh;display:grid;place-items:center;padding:32px;background:#05070c;color:#d8deea;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
              <div style="max-width:620px;border:1px solid #334155;border-radius:12px;background:#10141f;padding:20px;box-shadow:0 18px 48px rgba(0,0,0,.32);">
                <div style="font-size:18px;font-weight:750;margin-bottom:8px;">cleenosx could not open the interface</div>
                <div style="font-size:13px;line-height:1.5;color:#94a3b8;">${String(message).replace(/[<>&]/g, (char) => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" })[char])}</div>
              </div>
            </div>
          `;
        };
        window.addEventListener("error", (event) => {
          showBootError(event.message || "Unknown frontend error.");
        });
        window.addEventListener("unhandledrejection", (event) => {
          showBootError(event.reason?.message || event.reason || "Unknown async frontend error.");
        });
      })();
    </script>
    <style>
      :root {
        background: #05070c;
        color: #d8deea;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "SF Pro Text", "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: #05070c;
      }

      html:not(.black),
      html:not(.black) body {
        background: #f7f8fb;
        color: #172033;
      }

      #root:empty {
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      .boot-shell {
        width: min(420px, calc(100vw - 48px));
        display: grid;
        gap: 22px;
        justify-items: center;
        text-align: center;
      }

      .boot-art {
        position: relative;
        width: 168px;
        height: 128px;
      }

      .boot-drive {
        position: absolute;
        inset: 22px 12px 0;
        border: 1px solid #2a3345;
        border-radius: 16px;
        background: linear-gradient(180deg, #171d2b 0%, #0d121d 100%);
        box-shadow:
          0 18px 48px rgba(0, 0, 0, 0.32),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      html:not(.black) .boot-drive {
        border-color: #cbd5e1;
        background: linear-gradient(180deg, #ffffff 0%, #eef2f7 100%);
        box-shadow:
          0 18px 48px rgba(21, 31, 51, 0.14),
          inset 0 1px 0 rgba(255, 255, 255, 0.86);
      }

      .boot-drive::before {
        content: "";
        position: absolute;
        left: 22px;
        right: 22px;
        bottom: 20px;
        height: 10px;
        border-radius: 999px;
        background: #2a3345;
      }

      html:not(.black) .boot-drive::before {
        background: #dbe5ef;
      }

      .boot-drive::after {
        content: "";
        position: absolute;
        left: 22px;
        bottom: 20px;
        width: 58%;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(90deg, #2563eb, #0f8a5f);
        animation: boot-meter 1.4s ease-in-out infinite alternate;
      }

      .boot-block {
        position: absolute;
        width: 44px;
        height: 34px;
        border: 1px solid #1f4f8a;
        border-radius: 10px;
        background: #0b1f3a;
        box-shadow: 0 8px 24px rgba(37, 99, 235, 0.18);
      }

      html:not(.black) .boot-block {
        border-color: #bfdbfe;
        background: #eff6ff;
        box-shadow: 0 8px 24px rgba(37, 99, 235, 0.12);
      }

      .boot-block.one {
        left: 18px;
        top: 0;
        animation: boot-float 1.9s ease-in-out infinite;
      }

      .boot-block.two {
        right: 4px;
        top: 12px;
        width: 52px;
        border-color: #146c4a;
        background: #08251b;
        animation: boot-float 2.2s ease-in-out infinite reverse;
      }

      html:not(.black) .boot-block.two {
        border-color: #bbf7d0;
        background: #f0fdf4;
      }

      .boot-title {
        margin: 0;
        font-size: 28px;
        line-height: 1.1;
        font-weight: 750;
        letter-spacing: 0;
      }

      .boot-copy {
        margin: 8px 0 0;
        color: #94a3b8;
        font-size: 14px;
        line-height: 1.5;
      }

      html:not(.black) .boot-copy {
        color: #6a7488;
      }

      .boot-status {
        display: inline-flex;
        min-height: 36px;
        align-items: center;
        gap: 10px;
        border: 1px solid #2a3345;
        border-radius: 999px;
        background: #10141f;
        padding: 0 14px;
        color: #d8deea;
        font-size: 13px;
        font-weight: 650;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.24);
      }

      html:not(.black) .boot-status {
        border-color: #dbe5ef;
        background: #ffffff;
        color: #39445a;
        box-shadow: 0 4px 16px rgba(21, 31, 51, 0.08);
      }

      .boot-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #2563eb;
        animation: boot-pulse 0.9s ease-in-out infinite alternate;
      }

      @keyframes boot-meter {
        from {
          width: 34%;
        }
        to {
          width: 72%;
        }
      }

      @keyframes boot-float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      @keyframes boot-pulse {
        from {
          opacity: 0.45;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-shell">
        <div class="boot-art" aria-hidden="true">
          <div class="boot-block one"></div>
          <div class="boot-block two"></div>
          <div class="boot-drive"></div>
        </div>
        <div>
          <h1 class="boot-title">cleenosx</h1>
          <p class="boot-copy">Opening the macOS storage workspace.</p>
        </div>
        <div class="boot-status">
          <span class="boot-dot"></span>
          Loading interface
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
